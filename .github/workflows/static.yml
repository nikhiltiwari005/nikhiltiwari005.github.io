name: Build and deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: 'tech-blog'
      
      - name: Build Jekyll site with Gemfile
        run: |
          cd tech-blog
          bundle exec jekyll build
      
      - name: Create deployment artifact
        run: |
          # Create tech-blog directory
          mkdir -p _deploy/tech-blog
          
          # Copy all root-level files and directories (main site)
          cp -r favicon/ _deploy/ || true
          cp -r resume/ _deploy/ || true
          cp index.html _deploy/ || true
          cp manifest.json _deploy/ || true
          cp service-worker.js _deploy/ || true
          
          # Flatten Jekyll output - Jekyll builds with baseurl creates nested structure
          # Copy the actual tech-blog content (removes the nested tech-blog/ directory)
          if [ -d "tech-blog/_site/tech-blog" ]; then
            cp -r tech-blog/_site/tech-blog/* _deploy/tech-blog/
          else
            cp -r tech-blog/_site/* _deploy/tech-blog/
          fi
          
          # Also copy pages and other files from root of _site
          cp -r tech-blog/_site/pages/ _deploy/tech-blog/ 2>/dev/null || true
          cp tech-blog/_site/sitemap.xml _deploy/tech-blog/ 2>/dev/null || true
          cp tech-blog/_site/robots.txt _deploy/tech-blog/ 2>/dev/null || true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_deploy
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
