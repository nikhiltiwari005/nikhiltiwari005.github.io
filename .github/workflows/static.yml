name: Build and deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./tech-blog
          destination: ./tech-blog/_site
      
      - name: Create deployment artifact
        run: |
          # Create temp directory for deployment
          mkdir -p _deploy/tech-blog
          
          # Copy all root-level files and directories
          cp -r favicon/ _deploy/ || true
          cp -r resume/ _deploy/ || true
          cp index.html _deploy/ || true
          cp manifest.json _deploy/ || true
          cp service-worker.js _deploy/ || true
          
          # Copy built tech-blog to correct subdirectory
          cp -r tech-blog/_site/* _deploy/tech-blog/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_deploy
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
